syntax = "proto3";

package com.vht.bms.messages;

option java_package = "com.vht.bms.messages.track.cmd";
option java_outer_classname = "GroupTrackCommandProto";
option go_package = "./ipc";

message GroupTrackCommand {
    int32 track_id = 1;
    repeated int32 adding_groups = 2;
    repeated int32 removing_groups = 3;
}

message GroupTrackCommandV2 {
    int32 group_id = 1;
    repeated int32 adding_tracks = 2;
    repeated int32 removing_tracks = 3;
}