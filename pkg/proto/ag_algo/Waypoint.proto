syntax = "proto3";
import "pkg/proto/ag_algo/Turnpoint.proto";
import "pkg/proto/ag_algo/Checkpoint.proto";
import "pkg/proto/ag_algo/Beacon.proto";
import "pkg/proto/ag_algo/Point.proto";
import "pkg/proto/ag_algo/AircraftFlightParameters.proto";
import "pkg/proto/ag_algo/HandoverLine.proto";

package com.vht.afad.afmessages;

option go_package = "./ag";

enum TurnType {
    NO_TURN = 0; /** no turn or instantaneous turn */
    START_TURN = 1; /** start the turn at this point */
    END_TURN = 2; /** end the turn at this point */
    TURN_AROUND = 3; /** turn around this point */
    TURN_BEFORE = 4; /** turn before this point */
}

enum WaypointOrigin {
    USER = 0; /* created by user */
    /* new waypoint created by user while updating existed flight route
    * when this flight route is saved, USER_NEW will be changed to USER */
    SAFE_ALTITUDE = 2;//after take off, the 1st waypoint also the safe altitude waypoint for aircraft to change heading without collision with terran
    ENTRY_AREA = 3; /* entry point of an area, no flight route in this area */
    EXIT_AREA = 4; /* exit point of an area, no flight route in this area */
    /* when updating a flight route from real track position (e.g. intercept from patrol aircraft),
     * the flight route will jump from the planned track position to the real track position.
     * This real track position is the MergePoint*/
    MERGE_POINT = 5;
    /* when user updates a flight segment which contains planned track in an active flight,
     * the planned track position becomes an UP waypoint from where the flight route will be recalculated
     */
    UPDATE_FLIGHT = 6;//waypoint created by system at planned track position when user updates route
    /* new waypoint created by system while updating existed flight route
     * when this flight route is saved, UPDATE_FLIGHT_NEW will be changed to UPDATE_FLIGHT */
    SYSTEM = 7; //created by system
    DEPART_AIRPORT = 8; /* airport/guidance radar/takeoff point near airport */
    DEST_AIRPORT = 9; /* airport/guidance radar/descend point near airport */
    DIRECT_GUIDANCE_FURTHEST_POINT = 10;/*furthest point aircraft can reach in direct guidance mode*/
    AVOID_OBSTACLE = 11;
    /* start return to base waypoint after interception (v3) (start turn toward the landing airport) */
    INTERCEPT_RETURN_TO_BASE = 13;
    INTERCEPT = 15; /* wp generated by intercept calculator  = v1, v2)*/
    AVOID_OBSTACLE_V1 = 16; /* system created to avoid obstacles */
    AVOID_OBSTACLE_V2 = 17; /* system created to avoid obstacles */
    AVOID_OBSTACLE_V3 = 18; /* system created to avoid obstacles */

    //START_LANDING = 20;
    START_LANDING_V1 = 21;
    START_LANDING_V2 = 22;
    START_LANDING_V3 = 23;
    START_LANDING_V4 = 24;
    START_LANDING_V5 = 28;//bay bang/ chuan bi ha do cao xuong sb
    START_LANDING_V0 = 25;
    START_LANDING_V1PLUS = 26;//diem t keo dai
    START_LANDING_V2PLUS = 27;//diem ghi thoi gian ngang dai khi bay hinh hop
}

enum RctStatus {
    RctStatus_KNOWN = 0;
    RctStatus_UNKNOWN = 1;
    RctStatus_BATTLEZONE = 2;
}

message GRPCWaypoint {
    GRPCTurnpoint turnpoint = 1; //
    TurnType turnType = 2; //
    WaypointOrigin origin = 3; //
    double bankAngle = 5; //
    double turnRadius = 6; //
    double turnAngle = 7; //
    double realArrivalTime = 8; //
    double realFuelLeft = 9; //
    int32 turn360 = 10; //
    double cruiseSpeed = 11; //
    double cruiseAltitude = 12; //
    bool editing = 13; //
    double safeAltitude = 20; //
    double calculatedSafeAltitude = 21; //
    bool warningSafeAltitude = 22; //
    string contourCoords = 23; //
    double contourAltitude = 24; //
    GRPCTurnpoint start = 30; //
    GRPCTurnpoint center = 31; //
    GRPCTurnpoint end = 32; //
    repeated GRPCTurnpoint points = 33; //
    repeated GRPCCheckpoint checkpoints = 34; //
    repeated GRPCHandoverLine handoverLines = 35; //
    GRPCBeacon beacon = 40; //
    GRPCPolarPosition beaconPolar = 41; //
    GRPCPolarPosition airportBeaconPolar = 43; //
    bool useAirportPolar = 44; //
    repeated GRPCGeodeticPosition digitizedTurnArcPoints = 50; //
    repeated GRPCTurnpoint equalDurationPoints = 51; //
    GRPCDisplayLabelWaypoint displayLabelWaypoint = 52; //
    GRPCAircraftFlightParameters flightParameters = 101; //
    RctStatus rctStatus = 102; //
    double rctLength = 103; //
    double temperature = 104; //
    double dropWeight = 106; //
    double dropDrag = 107; //
}

message GRPCDisplayLabelWaypoint {
    double S = 1; //`json:"S,omitempty" bson:"S,omitempty"`
    double T = 2; //`json:"t,omitempty" bson:"t,omitempty"`
    double MK = 3; //`json:"MK,omitempty" bson:"MK,omitempty"`
    double TurnLength = 4; //`json:"turn_length,omitempty" bson:"turn_length,omitempty"`
    double TurnDuration = 5; //`json:"turn_duration,omitempty" bson:"turn_duration,omitempty"`
}