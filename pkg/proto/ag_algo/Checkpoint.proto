syntax = "proto3";
import "pkg/proto/ag_algo/Point.proto";
import "pkg/proto/ag_algo/Beacon.proto";

package com.vht.afad.afmessages;

option go_package = "./ag";

enum CheckpointType {
    MOUNTAIN = 0;
    CITY = 1;
}

message GRPCCheckpoint {
    string name = 1; //
    GRPCGeodeticPosition position = 2; //
    CheckpointType type = 3; //
    int32 sequence = 4; //
    GRPCGeodeticPosition projectedCheckpoint = 5; //
    double expectedArrivalTime = 6; //
    double duration = 7; //
    double length = 8; //
    GRPCBeacon beacon = 10; //
    GRPCPolarPosition beaconPolar = 11; //
    GRPCPolarPosition airportBeaconPolar = 12; //
}