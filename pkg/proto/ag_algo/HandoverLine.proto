syntax = "proto3";
import "pkg/proto/ag_algo/Point.proto";

package com.vht.afad.afmessages;

option go_package = "./ag";

message GRPCHandoverLine {
    string name = 1; //
    GRPCGeodeticPosition point1 = 2; //
    GRPCGeodeticPosition point2 = 3; //
    GRPCGeodeticPosition intersection = 4; //
    double expectedArrivalTime = 5; //
    string id = 6; //
}
